# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

# Post-TPM override: the plugin binds prefix+e during TPM startup, so replace it
# after plugin loading with a wrapper that restores the previous window layout.
bind-key e run-shell '$HOME/.config/tmux/scripts/tmux-agent-sidebar-layout-toggle "#{window_id}" #{q:pane_current_path}'

set-option -sa terminal-overrides ',xterm*:Tc'
set -g mouse on

# Quality-of-life defaults
set -g history-limit 100000
set -sg escape-time 0
set -g focus-events on

# Keep window names stable/predictable
set -g allow-rename off
set -g automatic-rename off

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind -n M-H previous-window
bind -n M-L next-window

# Nested tmux workaround:
# - Outer tmux keeps using Ctrl-h/j/k/l (via vim-tmux-navigator) for local pane nav.
# - When the pane is running ssh/mosh, Meta-h/j/k/l sends Ctrl-h/j/k/l through to
#   the remote (inner) tmux so navigation works there too.
bind-key -n M-h if-shell -F '#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}}' 'send-keys C-h' 'send-keys M-h'
bind-key -n M-j if-shell -F '#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}}' 'send-keys C-j' 'send-keys M-j'
bind-key -n M-k if-shell -F '#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}}' 'send-keys C-k' 'send-keys M-k'
bind-key -n M-l if-shell -F '#{||:#{==:#{pane_current_command},ssh},#{==:#{pane_current_command},mosh-client}}' 'send-keys C-l' 'send-keys M-l'

# Ghostty sends Ctrl-h ambiguously as the terminal Backspace/control-H byte.
# Use a private sequence so tmux can distinguish Ctrl-h from Backspace.
set -s user-keys[0] "\e]777;ctrlh\a"
bind-key -n User0 if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'" "send-keys C-h" "select-pane -L"
bind-key -T copy-mode-vi User0 select-pane -L

# Reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"

# For nested tmux sessions
bind-key -n C-a send-prefix

# Sets parent terminal title, same as current Tmux window
set -g set-titles on
set -g set-titles-string "#I:#W"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

######################################################################
# Pop-Up Menus                                                       #
######################################################################

# Prefix + Ctrl J shows a session list popup selector with fzf
bind C-j display-popup -E 's=$(tmux list-sessions -F "#S" | grep -Fxv "$(tmux display-message -p "#S")" | fzf --reverse); [ -n "$s" ] && tmux switch-client -t "$s"'

unbind W

# Prefix + Ctrl W opens/selects a window for a git worktree in the current repo.
bind C-w display-popup -E "$HOME/dotfiles/scripts/misc/tmux-worktree-window --mode window #{q:pane_current_path}"

# Prefix + Ctrl G changes the current shell pane to a git worktree.
bind C-g display-popup -E "$HOME/dotfiles/scripts/misc/tmux-worktree-window --mode pane-cd #{q:pane_current_path}"

# Show htop on Prefix + Ctrl H
bind C-h display-popup -E "htop"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'         # Save text to system clipboard
set -g @plugin 'tmux-plugins/tmux-sessionist'   # Easily manage sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # Contineous saves environment for next time
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Restart previous environment on launch
# set -g @plugin 'tmux-plugins/tmux-sidebar'      # Shows file tree on the left, `tab`
set -g @plugin 'tmux-plugins/tmux-open'         # Opens highlighted addresses / files: `o`
set -g @plugin 'git@github.com:Ramlaoui/tmux-opener.git' # Opens remote URLs/files through the local opener bridge
# set -g @plugin 'jaclu/tmux-menus'               # Context menus for common tasks: `#`
set -g @plugin 'laktak/extrakto'                # Clipboard copy and output completions
set -g @plugin 'hiroppy/tmux-agent-sidebar'     # Monitor AI agent panes across tmux sessions

# Create the agent sidebar only through the local layout-preserving toggle below.
set -g @sidebar_auto_create off

# for linux
set -g set-clipboard on

# Restore tmux environment
set -g @continuum-restore 'on'

# Copy mode vi
set-window-option -g mode-keys vi
# Tmux defaults to 5 lines per mouse wheel event in copy-mode; keep scrolling tighter.
bind-key -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind-key -T copy-mode-vi o send-keys -X copy-pipe-and-cancel 'sed s/##/####/g | xargs -I {} tmux run-shell -b "cd #{pane_current_path}; xdg-open \"{}\" > /dev/null"'
bind-key -T copy-mode o send-keys -X copy-pipe-and-cancel 'sed s/##/####/g | xargs -I {} tmux run-shell -b "cd #{pane_current_path}; xdg-open \"{}\" > /dev/null"'
# If tmux-opener is installed, copy-mode `o` tries the SSH-forwarded local opener first
# and falls back to same-host open/xdg-open when the bridge is unavailable.
set -g @tmux_opener_fallback 'auto'
set -gu @tmux_opener_fallback_command
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Split window horizontally (h) / veritcally (v)
bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5
# Fallback resize keys (more reliable than Meta on some setups)
bind-key -r -T prefix K resize-pane -U 5
bind-key -r -T prefix J resize-pane -D 5
bind-key -r -T prefix H resize-pane -L 5
bind-key -r -T prefix L resize-pane -R 5
# Resize panes using prefix + vim arrow keys

# Move the current pane around the layout with prefix + m, then h/j/k/l.
bind-key m display-message "move pane: h/j/k/l, q to cancel" \; switch-client -T pane-move
bind-key -r -T pane-move h if-shell -F '#{pane_at_left}' 'display-message "No pane left"' 'select-pane -m ; select-pane -L ; swap-pane ; select-pane -t "{marked}" ; select-pane -M ; switch-client -T pane-move'
bind-key -r -T pane-move j if-shell -F '#{pane_at_bottom}' 'display-message "No pane below"' 'select-pane -m ; select-pane -D ; swap-pane ; select-pane -t "{marked}" ; select-pane -M ; switch-client -T pane-move'
bind-key -r -T pane-move k if-shell -F '#{pane_at_top}' 'display-message "No pane above"' 'select-pane -m ; select-pane -U ; swap-pane ; select-pane -t "{marked}" ; select-pane -M ; switch-client -T pane-move'
bind-key -r -T pane-move l if-shell -F '#{pane_at_right}' 'display-message "No pane right"' 'select-pane -m ; select-pane -R ; swap-pane ; select-pane -t "{marked}" ; select-pane -M ; switch-client -T pane-move'
bind-key -T pane-move q display-message "pane move cancelled"
bind-key -T pane-move Escape display-message "pane move cancelled"

# Scroll the current pane with prefix + u, then j/k.
# Keep normal vi copy-mode bindings explicit so re-sourcing clears older
# pane-scroll-mode overrides from already-running tmux servers.
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi q send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X clear-selection
bind-key u copy-mode -e \; display-message "scroll mode: j/k, q to exit" \; switch-client -T pane-scroll
bind-key -r -T pane-scroll j send-keys -X -N 10 scroll-down \; switch-client -T pane-scroll
bind-key -r -T pane-scroll k send-keys -X -N 10 scroll-up \; switch-client -T pane-scroll
bind-key -T pane-scroll q send-keys -X cancel
bind-key -T pane-scroll Escape send-keys -X cancel

